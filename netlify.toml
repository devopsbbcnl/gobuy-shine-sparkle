[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/form-submit"
  to = "/.netlify/functions/form-submit"
  status = 200

# SPA (React Router): send all non-file routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

SECRETS_SCAN_OMIT_KEYS = "SMTP_HOST,SMTP_FROM_NAME,SMTP_FROM_USER,FORM_API_PORT,SMTP_FROM_EMAIL,FORMS_TO_EMAIL"